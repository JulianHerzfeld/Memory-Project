<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
</head>

<body>

    <div class="settings-wrapper">
        <header>
            <h1>Settings</h1>
            <img src="public/assets/icons/line-settings-headline.svg" alt="headline underscore">
        </header>
        <div class="settings-content">
            <div>
                <form>
                    <div>
                        <h2><img src="public/assets/icons/setting-theme-icon.svg" alt="settings theme icon"> Game themes
                        </h2>

                        <input type="radio" id="set-code-theme" name="theme" checked value="Code">
                        <label for="set-code-theme">Code vibes theme</label><br>

                        <input type="radio" id="set-game-theme" name="theme" value="Game">
                        <label for="set-game-theme">Gaming theme</label><br>

                        <input type="radio" id="set-food-theme" name="theme" value="Food">
                        <label for="set-food-theme">Foods theme</label>
                    </div>
                    <div>
                        <h2><img src="public/assets/icons/settings-player-icon.svg" alt="settings player icon"> Player
                        </h2>

                        <input type="radio" id="set-player-blue" name="player" checked value="Blue">
                        <label for="set-player-blue">Blue</label><br>

                        <input type="radio" id="set-player-orange" name="player" value="Orange">
                        <label for="set-player-orange">Orange</label>
                    </div>
                    <div>
                        <h2><img src="public/assets/icons/settings-board-icon.svg" alt="settings board icon"> Board size
                        </h2>

                        <input type="radio" id="set-board-16" name="board" checked value="16 Cards">
                        <label for="set-board-16">16 cards</label><br>

                        <input type="radio" id="set-board-24" name="board" value="24 Cards">
                        <label for="set-board-24">24 cards</label><br>

                        <input type="radio" id="set-board-36" name="board" value="36 Cards">
                        <label for="set-board-36">36 cards</label>
                    </div>
                </form>
            </div>
            <div class="settings-preview">
                <section class="settings-preview__img">
                    <img src="public/assets/img/code-theme-img/code-theme-preview.svg" alt="theme img">
                </section>
                <section>
                    <div id="selected-settings" class="selected-settings">
                        <p class="selected-theme">Code theme</p>
                        <img src="public/assets/icons/settings-separating-line.svg" alt="seperating line">
                        <p class="selected-player">Player</p>
                        <img src="public/assets/icons/settings-separating-line.svg" alt="seperating line">
                        <p class="selected-board">Board Size</p>
                        <button><img src="public/assets/icons/settings-start-icon.svg"
                                alt="start button icon">Start</button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script type="module" src="src/views/settings-view.ts"></script>

</body>

</html>
