<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
</head>

<body>

    <div id="app">
        <header id="game-view-header" class="game-header">
            <div class="header-content">
                <div class="player-points">
                    <div class="player-1">
                        <img id="player-1" src="public/assets/icons/label.svg" alt="blue label">
                        <p class="code-theme-player">Blue</p>
                        <p id="score-p-1">0</p>
                    </div>
                    <div class="player-2">
                        <img id="player-2" src="public/assets/icons/label (1).svg" alt="orange label">
                        <p class="code-theme-player">Orange</p>
                        <p id="score-p-2">0</p>
                    </div>
                </div>
                <div class="current-player">
                    <div>
                        <p>Current player</p>
                        <img id="current-player-icon" src="public/assets/icons/label.svg" alt="blue label">
                    </div>
                </div>

                <div class="exit-game-container">
                    <button id="open-btn"><img src="public/assets/icons/move_item.svg" alt="exit icon">Exit
                        game</button>
                </div>
            </div>
        </header>
        <div class="card-content-wrapper">
            <div id="card-content"></div>
        </div>


        <dialog id="game-dialog">
            <div id="dialog-content">
                <p>Are you sure you want to quit the game?</p>
                <div class="dialog-btns">
                    <button id="close-btn" class="dialog-close-btn">Back to game</button>
                    <a id="dialog-quit-btn" class="dialog-exit-btn" href="settings.html">Exit game</a>
                </div>
            </div>

        </dialog>
    </div>

    <script type="module" src="src/views/game-view.ts"></script>
</body>

</html>
